<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每月運動成果與回顧 | Fitness Challenge</title>
  <link rel="stylesheet" href="summary.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
  <header class="summary-header">
    <div class="header-content">
      <a href="index.html" class="back-link">← 返回日曆</a>
      <h1>🌟 每月運動成果與回顧</h1>
    </div>
  </header>

  <main class="summary-main">
    <section class="controls-section card">
      <div class="control-group">
        <label for="nameSelect">選擇成員：</label>
        <select id="nameSelect">
          <option value="">載入中...</option>
        </select>
      </div>
      <div class="control-group">
        <label for="monthSelect">選擇月份：</label>
        <select id="monthSelect">
          <option value="">載入中...</option>
        </select>
      </div>
      <button id="generateBtn" class="btn-primary">✨ 產生回顧報告</button>
    </section>

    <!-- 載入中動畫 -->
    <div id="loadingIndicator" class="hidden">
      <div class="spinner-large"></div>
      <p>正在拉取您的運動數據，請稍候...</p>
    </div>

    <!-- 報告區塊 -->
    <div id="reportActions" class="hidden" style="display: flex; gap: 1rem; justify-content: flex-end; margin-bottom: 1.5rem;">
      <button id="shareLineBtn" style="padding: 0.8rem 1.5rem; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); background: #06c755; color: white; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(6, 199, 85, 0.4);">💬 分享至 LINE</button>
      <button id="downloadPdfBtn" style="padding: 0.8rem 1.5rem; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; transition: all 0.3s ease; backdrop-filter: blur(10px);">📥 下載並備份為 PDF</button>
    </div>
    <section id="reportSection" class="report-section hidden">
      <aside id="aiSummaryCard" class="ai-card hidden" style="margin-bottom: 3rem; padding: 2.5rem; background: rgba(56, 189, 248, 0.05); border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 24px; position: relative; overflow: hidden;">
        <div style="position: absolute; top:0; left:0; width:4px; height:100%; background: linear-gradient(to bottom, #38bdf8, #8b5cf6);"></div>
        <h3 class="ai-title" style="margin-top:0; font-size: 1.5rem; display:flex; align-items:center; gap:0.5rem; color: #f8fafc;"><span style="font-size: 1.8rem;">🤖</span> AI 教練本月總結與建議</h3>
        <div id="aiLoading" class="ai-loading" style="color: #38bdf8; font-weight: 500; font-size: 1.1rem; animation: pulse 1.5s infinite;">正在分析您的運動數據，並估算消耗的卡路里... ⚡</div>
        <div id="aiContent" class="ai-content" style="line-height: 1.8; font-size: 1.15rem; color: #e2e8f0; margin-top: 1.5rem;"></div>
      </aside>

      <h2>📅 運動時間軸</h2>
      <div id="timelineContainer" class="timeline"></div>
    </section>
  </main>

  <script src="summary.js?v=2.1"></script>
</body>
</html>
